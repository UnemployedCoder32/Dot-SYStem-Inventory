<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Ledger | DOT System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="app-icon.png">
</head>
<body class="page-entering">
    <div class="background-effect"></div>
    <div class="background-effect effect-2"></div>
    
    <div class="container">
        <header>
            <div class="header-main">
                <div class="header-title">
                    <h1><i class="fa-solid fa-receipt"></i> Transactions</h1>
                    <p>Financial History & Stock Movements</p>
                </div>
                
                <nav class="header-nav">
                    <a href="index.html" class="nav-btn-alt" title="Dashboard">
                        <i class="fa-solid fa-house"></i>
                        <span>Home</span>
                    </a>
                    <a href="calendar.html" class="nav-btn-alt" title="Business Calendar">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span>Calendar</span>
                    </a>
                    <a href="repair-jobs.html" class="nav-btn-alt" title="Repairs">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        <span>Repairs</span>
                    </a>
                    <a href="employees.html" class="nav-btn-alt" title="Staff Management">
                        <i class="fa-solid fa-users"></i>
                        <span>Staff</span>
                    </a>
                    <a href="amc-management.html" class="nav-btn-alt" title="AMC Management">
                        <i class="fa-solid fa-building-shield"></i>
                        <span>AMC</span>
                    </a>
                    <a href="service-visits.html" class="nav-btn-alt" title="Service Visits">
                        <i class="fa-solid fa-car-side"></i>
                        <span>Visits</span>
                    </a>
                    <a href="calendar.html" class="nav-btn-alt" title="Business Calendar">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span>Calendar</span>
                    </a>
                </nav>
            </div>

            <div class="header-system">
                <div class="stats-mini">
                    <div class="stat-pill glass-card">
                        <span class="label">Net Sales Profit:</span>
                        <span id="statSalesProfit" class="value" style="color: #10b981;">₹0.00</span>
                    </div>
                </div>
                
                <div class="system-actions">
                    <div class="theme-switch-wrapper">
                        <label class="switch" for="themeCheckbox">
                            <input type="checkbox" id="themeCheckbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="ledger-section glass-card">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h2><i class="fa-solid fa-list-check"></i> Transaction History</h2>
                        <p style="font-size: 0.85rem; color: var(--text-muted);">Real-time log of Sales & Purchases</p>
                    </div>
                    <button class="btn btn-primary" onclick="openTransactionModal()">
                        <i class="fa-solid fa-plus"></i> New Transaction
                    </button>
                </div>
                
                <div class="table-container">
                    <table class="tally-table">
                        <thead>
                            <tr>
                                <th>Date / Time</th>
                                <th>Item Name</th>
                                <th>Type</th>
                                    <th>Qty</th>
                                    <th>Rate</th>
                                    <th>Total</th>
                                    <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ledgerList">
                            <!-- Transactions go here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- New Transaction Modal -->
    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-cart-shopping text-cyan"></i> Log Transaction</h2>
                <button class="modal-close" onclick="closeTransactionModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="transactionForm">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Transaction Type</label>
                    <div class="transaction-toggle">
                        <input type="radio" id="typePurchase" name="trType" value="Purchase" checked>
                        <label for="typePurchase">Purchase (Stock In)</label>
                        <input type="radio" id="typeSale" name="trType" value="Sale">
                        <label for="typeSale">Sale (Stock Out)</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="trItem">Select Item</label>
                    <select id="trItem" required>
                        <!-- Populated by JS -->
                    </select>
                </div>

                <div class="form-group">
                    <label for="trQty">Quantity</label>
                    <input type="number" id="trQty" min="1" required placeholder="Enter quantity">
                    <div id="stockError" style="color: #ef4444; font-size: 0.8rem; margin-top: 0.5rem; display: none;">
                        <i class="fa-solid fa-circle-exclamation"></i> Insufficient Stock!
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button type="submit" id="confirmTrBtn" class="btn btn-primary" style="flex: 1;">
                        Confirm Transaction
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="data-controller.js"></script>
    <script src="app-utils.js"></script>
    <script src="theme-system.js"></script>
    <script src="transactions-script.js"></script>
    <script src="notifications.js"></script>
    <script src="transitions.js"></script>
</body>
</html>
