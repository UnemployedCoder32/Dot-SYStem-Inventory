<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Jobs | Tally Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="app-icon.png">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-top: 1rem;
        }

        .forms-col {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        /* Table Button Styles */
        .btn-wa {
            background: #25D366;
            color: white;
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
        }

        .btn-wa:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3);
        }

        .phone-input-group {
            display: flex;
            align-items: stretch;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .phone-input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .country-code {
            padding: 0.875rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-weight: 600;
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
            user-select: none;
        }

        .phone-input {
            flex: 1;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0.875rem 1rem;
        }

        .phone-input:focus {
            box-shadow: none;
            background: transparent;
        }
        
        .status-badge {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .status-badge.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Search Bar Styling */
        .search-container {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 1.25rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.5rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input:focus {
            background: rgba(15, 23, 42, 0.6);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Form Grid for new fields */
        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            outline: none;
            transition: all 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        select option {
            background: var(--bg-dark);
        }
    </style>
</head>
<body>
    <div class="background-effect"></div>
    <div class="background-effect effect-2"></div>
    
    <div class="container" style="max-width: 1400px;">
        <header>
            <div class="header-title">
                <h1><i class="fa-solid fa-screwdriver-wrench text-cyan"></i> Repair Jobs</h1>
                <p>Track device repairs and send automated WhatsApp updates.</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <a href="index.html" class="btn btn-outline" style="border: 1px solid var(--accent); color: var(--text-main); text-decoration: none;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Inventory
                </a>
            </div>
        </header>

        <main class="dashboard-grid">
            
            <!-- Left Column: Repair Form -->
            <div class="forms-col">
                <section class="glass-card">
                    <h2><i class="fa-solid fa-clipboard-list"></i> Log Repair Ticket</h2>
                    <form id="repairForm">
                        <div class="form-group">
                            <label for="custName">Customer Name</label>
                            <input type="text" id="custName" placeholder="e.g. Aman Patil" required>
                        </div>
                        <div class="form-group">
                            <label for="custPhone" style="display: flex; justify-content: space-between;">
                                WhatsApp Number
                                <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: normal;">(Without country code)</span>
                            </label>
                            <div class="phone-input-group">
                                <div class="country-code">+91</div>
                                <input type="tel" id="custPhone" class="phone-input" placeholder="9876543210" pattern="[0-9]{10}" required>
                            </div>
                        </div>
                        <div class="form-grid-2">
                            <div class="form-group">
                                <label for="deviceType">Device Type</label>
                                <select id="deviceType" required>
                                    <option value="Laptop">Laptop</option>
                                    <option value="Desktop">Desktop</option>
                                    <option value="Printer">Printer</option>
                                    <option value="Mobile">Mobile</option>
                                    <option value="Tablet">Tablet</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="deviceModel">Model / Mode</label>
                                <input type="text" id="deviceModel" placeholder="e.g. L340 / G31" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="deviceIssue">Problem / Issue</label>
                            <input type="text" id="deviceIssue" placeholder="e.g. Screen Replacement / No Power" required>
                        </div>
                        <div class="form-grid-2">
                            <div class="form-group">
                                <label for="estPrice">Estimated Price (₹)</label>
                                <input type="number" id="estPrice" min="0" step="10" placeholder="e.g. 1500" required>
                            </div>
                            <div class="form-group">
                                <label for="extraCharges">Extra Charges (₹)</label>
                                <input type="number" id="extraCharges" min="0" step="1" value="0" placeholder="e.g. 200">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="jobComment">Notes / Comments</label>
                            <textarea id="jobComment" placeholder="Any specific instructions or details..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-full" style="margin-top: 1rem;">
                            <i class="fa-solid fa-plus"></i> Create Ticket
                        </button>
                    </form>
                </section>
            </div>

            <!-- Right Column: Jobs Table -->
            <section class="inventory-list-section glass-card" style="height: fit-content;">
                <div class="section-header">
                    <h2><i class="fa-solid fa-list-check"></i> <span>Repair History</span></h2>
                    <span id="totalJobs" class="badge">0 Jobs</span>
                </div>

                <div class="search-container">
                    <div class="search-input-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="jobSearch" class="search-input" placeholder="Search by SR No, Customer Name, or Phone...">
                    </div>
                </div>
                
                <div class="table-container">
                    <table id="jobTable">
                        <thead>
                            <tr>
                                <th>SR No</th>
                                <th>Customer Details</th>
                                <th>Device Info</th>
                                <th>Final Cost</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="jobList">
                            <tr id="emptyJobRow" class="empty-state">
                                <td colspan="6">
                                    <div class="empty-content">
                                        <i class="fa-solid fa-folder-open"></i>
                                        <p>No repair tickets logged yet.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
            </section>
            
        </main>
    </div>

    <script src="repair-script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
